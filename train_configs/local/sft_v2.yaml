# SFT v2 配置 - 对齐 AbstRaL 论文 (单卡适配)
# 改动:
#   - LR: 2e-5 → 5e-6 (论文 4 倍, 我们的训练更稳定)
#   - per_device_batch: 1 → 2 (单卡显存够, 提速)
#   - grad_accum: 16 → 4 (等效 batch 8 = 2×4, 对齐论文)
#   - completion_only_loss: true → false (全序列 loss, 更接近论文)
#   - warmup_ratio: 0.1 → 0.03 (论文默认 1-3% 范围)
model:
  model_name_or_path: /home/wwq416/snap/wwq/model/Qwen/Qwen2.5-0.5B-Instruct
  trust_remote_code: true
data:
  train_file: /home/wwq416/snap/wwq/math-chain/chaingsm_data/data/final/sft/all_sft_train_prompt_completion.jsonl
  max_samples: null
output:
  output_dir: /home/wwq416/snap/wwq/math-chain/outputs/train/local/sft/Qwen2.5-0.5B-Instruct/sft_v2_abstral
training:
  max_length: 3072
  completion_only_loss: false
  packing: false
  num_train_epochs: 1
  max_steps: 382
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_strategy: steps
  logging_first_step: true
  logging_steps: 20
  disable_tqdm: false
  log_level: info
  save_strategy: "no"
  save_total_limit: 1
  bf16: true
  gradient_checkpointing: true
  report_to: []
  remove_unused_columns: false
lora:
  enabled: false
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear
eval:
  enabled: false
  baseline_before_train: false
  data_path: /home/wwq416/snap/wwq/math-chain/chaingsm_data/data/gsmchain/gsm8k_test_clean.jsonl
  method: train_json_prompt
  limit: null
  batch_size: 32
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  gpu_memory_utilization_candidates: [0.85, 0.7, 0.6, 0.55, 0.5, 0.45, 0.4, 0.35, 0.3, 0.25]
  dtype: auto
  max_model_len: null
  max_tokens: 512
  top_k: 1
  top_p: 1.0
  seed: 42
  trust_remote_code: true
  offload_model_before_vllm: true
