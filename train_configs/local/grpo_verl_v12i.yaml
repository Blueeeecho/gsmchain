# verl GRPO v12i training config for ChainGSM on RTX 5090 (single GPU)
#
# v12i 设计: V12 prompt + V12i reward (4 项, 跟 V12 公式同构, 信号源重做)
# - r_answer (3.0): V12 沿用, 末态硬信号
# - r_step_value_lcs (1.5): NEW, LCS + 0.5% 容差, 治 0.1+0.2 浮点失败
# - r_step_value_exact (0.5): NEW, 严格相等, 抓重复算
# - r_distractor (-0.5): 改良, 每行 + final 比 dist 算式
# 起点: Qwen2.5-0.5B-Instruct base (跳过 SFT, V12i 重新 GRPO)
# 数据: chaingsm_data/data/final/grpo/grpo_v12_json.parquet (3051 行, 5 类别, V12 同源)
# 评测: cot_brackets_v12_json (V12 prompt)
#
# 训练量: 2 epoch × 762 steps/epoch = 1524 total steps
# 保存: 每 300 步 (5 ckpts @ 300/600/900/1200/1500)
# 预期: overall 22.9% → 26-30% (V12 baseline 上 +3-7 pp, 主要靠浮点容差 + distractor per-step)
#
# V12i max_prompt_length 2048: V12 prompt 4873 tokens, 2048 截断 (跟 V12 训练时一样)

data:
  train_files: /home/wwq416/snap/wwq/math-chain/chaingsm_data/data/final/grpo/grpo_v12_json.parquet
  val_files: /home/wwq416/snap/wwq/math-chain/chaingsm_data/data/final/grpo/grpo_v12_json.parquet
  train_batch_size: 4
  val_batch_size: 4
  max_prompt_length: 2048
  max_response_length: 1024
  filter_overlong_prompts: true
  truncation: error

actor_rollout_ref:
  hybrid_engine: true
  model:
    path: /home/wwq416/snap/wwq/model/Qwen/Qwen2.5-0.5B-Instruct
    use_remove_padding: false
    enable_gradient_checkpointing: true
  actor:
    optim:
      lr: 5.0e-7
      weight_decay: 0.1
      betas: [0.9, 0.99]
      lr_scheduler_type: cosine
      lr_warmup_steps_ratio: 0.1
      clip_grad: 0.1
    ppo_mini_batch_size: 4
    ppo_micro_batch_size_per_gpu: 1
    use_kl_loss: true
    kl_loss_coef: 0.04
    kl_loss_type: low_var_kl
    clip_ratio: 0.2
    entropy_coeff: 0
    loss_agg_mode: token-mean
    fsdp_config:
      param_offload: true
      optimizer_offload: true
    checkpoint:
      save_contents: ['model', 'optimizer', 'extra', 'hf_model']
      load_contents: ['model', 'optimizer', 'extra']
  rollout:
    name: vllm
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.4
    n: 4
    temperature: 0.9
    top_p: 1.0
    top_k: 50
    enforce_eager: true
    free_cache_engine: true
    log_prob_micro_batch_size_per_gpu: 1
    enable_sleep_mode: true
  ref:
    log_prob_micro_batch_size_per_gpu: 1
    fsdp_config:
      param_offload: true

reward_model:
  enable: false

custom_reward_function:
  path: /home/wwq416/snap/wwq/math-chain/train_pipeline/reward_chaingsm_v12i_json_verl.py
  name: compute_reward
  reward_kwargs:
    # v12i: 4 项, 跟 V12 公式同构
    answer_weight: 3.0                  # r_answer: 末态硬信号
    step_value_weight: 1.5              # r_step_value_lcs: LCS + 0.5% 容差
    step_value_exact_weight: 0.5        # r_step_value_exact: 严格相等
    distractor_weight: 0.5              # r_distractor: per-step 比 dist 算式

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false

trainer:
  critic_warmup: 0
  logger: ["console", "file"]
  project_name: chaingsm_local_grpo_verl
  experiment_name: qwen2.5-0.5b-grpo-verl-v12i-reward
  default_local_dir: /home/wwq416/snap/wwq/math-chain/outputs/train/local/grpo_verl/Qwen2.5-0.5B-Instruct
  n_gpus_per_node: 1
  nnodes: 1
  total_epochs: 2
  save_freq: 300
  test_freq: -1
  val_before_train: false
