# verl GRPO training config for ChainGSM on RTX 5090 (single GPU)
#
# This config adapts the paper parameters for local single-GPU training.
# Data is in parquet format (verl_grpo_train.parquet) generated by preprocess_chaingsm.py.
# Reward function is in train_pipeline/reward_chaingsm_verl.py.
#
# Evaluation:
#   - verl's internal validation (test_freq) only computes reward on val_files
#   - Real vLLM accuracy evaluation is handled by run_grpo_verl.sh post-training
#   - Checkpoints are saved with HF format (hf_model) for vLLM loading
#   - Eval is done on gsm8k_test_all.jsonl (separate from val_files)

data:
  train_files: /home/wwq416/snap/wwq/math-chain/chaingsm_data/data/final/rl_preprocessed/gsm8k_train_balanced_one_variant_14946/verl_grpo_train.parquet
  # val_files is used by verl's internal _validate() for reward computation only.
  # This is NOT the same as the vLLM accuracy evaluation on gsm8k_test.
  # Keep it as training data since we don't have a separate verl-format val set.
  val_files: /home/wwq416/snap/wwq/math-chain/chaingsm_data/data/final/rl_preprocessed/gsm8k_train_balanced_one_variant_14946/verl_grpo_train.parquet
  train_batch_size: 4
  val_batch_size: 4
  max_prompt_length: 768
  max_response_length: 1024
  filter_overlong_prompts: true
  truncation: error

actor_rollout_ref:
  hybrid_engine: true
  model:
    path: /home/wwq416/snap/wwq/math-chain/outputs/train/local/sft/Qwen2.5-0.5B-Instruct/sft_20epoch_full_eval/20260528_193544/checkpoints/best
    use_remove_padding: false
    enable_gradient_checkpointing: true
  actor:
    optim:
      lr: 5.0e-7
      weight_decay: 0.1
      betas: [0.9, 0.99]
      lr_scheduler_type: cosine
      lr_warmup_steps_ratio: 0.1
      clip_grad: 0.1
    ppo_mini_batch_size: 4
    ppo_micro_batch_size_per_gpu: 1
    use_kl_loss: true
    kl_loss_coef: 0.04
    kl_loss_type: low_var_kl
    clip_ratio: 0.2
    entropy_coeff: 0
    loss_agg_mode: token-mean
    fsdp_config:
      param_offload: false
      optimizer_offload: false
    checkpoint:
      # Include 'hf_model' so checkpoints can be loaded by vLLM for evaluation
      save_contents: ['model', 'optimizer', 'extra', 'hf_model']
      load_contents: ['model', 'optimizer', 'extra']
  rollout:
    name: vllm
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.3
    n: 4
    temperature: 0.9
    top_p: 1.0
    top_k: 50
    enforce_eager: true
    free_cache_engine: true
    log_prob_micro_batch_size_per_gpu: 1
  ref:
    log_prob_micro_batch_size_per_gpu: 1
    fsdp_config:
      param_offload: true

reward_model:
  enable: false

custom_reward_function:
  path: /home/wwq416/snap/wwq/math-chain/train_pipeline/reward_chaingsm_verl.py
  name: compute_reward
  # reward_kwargs is not in the Hydra structured config, so it must be
  # overridden with '+' prefix on the command line (e.g.
  # +custom_reward_function.reward_kwargs.format_weight=0.2).
  # The runtime code reads it via config.get("reward_kwargs", {}).
  reward_kwargs:
    format_weight: 0.2
    answer_weight: 2.5
    expression_weight: 1.0
    trace_weight: 1.0
    distractor_penalty: 0.5
    invalid_reward: -0.5

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false

trainer:
  critic_warmup: 0
  logger: ["console", "file"]
  project_name: chaingsm_local_grpo_verl
  experiment_name: qwen2.5-0.5b-grpo-verl
  default_local_dir: /home/wwq416/snap/wwq/math-chain/outputs/train/local/grpo_verl/Qwen2.5-0.5B-Instruct
  n_gpus_per_node: 1
  nnodes: 1
  total_epochs: 20
  # save_freq is set dynamically by run_grpo_verl.sh.
  # to save a checkpoint at each epoch boundary for vLLM evaluation.
  save_freq: 882
  # test_freq=-1: disable verl's internal reward-based validation
  # (we use post-training vLLM accuracy evaluation instead)
  test_freq: -1
  val_before_train: false
  resume_mode: disable

# Evaluation config (used by run_grpo_verl.sh, NOT by verl itself)
eval:
  enabled: true
  baseline_before_train: true
  data_path: /home/wwq416/snap/wwq/math-chain/chaingsm_data/data/final/gsm8k_test_full/gsm8k_test_all.jsonl
  method: train_json_prompt
  gpu_memory_utilization: 0.4
  batch_size: 64

ray_kwargs:
  ray_init:
    num_cpus: 16
