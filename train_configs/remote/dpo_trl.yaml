model:
  model_name_or_path: ${REMOTE_MODEL_PATH}
  ref_model_name_or_path: null
  trust_remote_code: true
data:
  train_file: ${REMOTE_DATA_DIR}/dpo_train.jsonl
  max_samples: null
output:
  output_dir: ${REMOTE_OUTPUT_DIR}/dpo_trl/default
training:
  max_length: 3072
  max_prompt_length: 768
  max_completion_length: 2048
  beta: 0.1
  loss_type: sigmoid
  num_train_epochs: 1
  max_steps: -1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 5.0e-6
  logging_strategy: steps
  logging_first_step: true
  logging_steps: 10
  disable_tqdm: false
  log_level: info
  save_strategy: "no"
  save_total_limit: 1
  bf16: true
  gradient_checkpointing: true
  report_to: []
  remove_unused_columns: false
lora:
  enabled: false
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear
eval:
  enabled: true
  baseline_before_train: true
  data_path: ${REMOTE_EVAL_DATA_PATH}
  method: train_json_prompt
  limit: null
  batch_size: 64
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.8
  gpu_memory_utilization_candidates: [0.8, 0.7, 0.6, 0.55, 0.5, 0.45, 0.4, 0.35, 0.3, 0.25]
  dtype: auto
  max_model_len: null
  max_tokens: 2048
  top_k: 1
  top_p: 1.0
  seed: 42
  trust_remote_code: true
  offload_model_before_vllm: true
