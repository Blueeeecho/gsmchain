data:
  train_batch_size: 256
  micro_batch_size_per_gpu: 4
  train_files: ${oc.env:REMOTE_DATA_DIR}/verl_sft_train.parquet
  val_files: ${oc.env:REMOTE_DATA_DIR}/verl_sft_train.parquet
  prompt_key: question
  response_key: answer
  max_length: 1024
  truncation: error
model:
  partial_pretrain: ${oc.env:REMOTE_MODEL_PATH}
  trust_remote_code: true
  enable_gradient_checkpointing: true
  lora_rank: 0
  lora_alpha: 16
  target_modules: all-linear
  strategy: fsdp2
optim:
  lr: 2.0e-5
  warmup_steps_ratio: 0.1
  lr_scheduler: cosine
trainer:
  default_local_dir: ${oc.env:REMOTE_OUTPUT_DIR}/sft_verl/checkpoints
  project_name: chaingsm_remote_sft
  experiment_name: qwen2.5-0.5b-sft
  total_epochs: 1
  logger: [console, wandb]
  save_freq: 100
  test_freq: -1
  nnodes: 1
  n_gpus_per_node: 4

