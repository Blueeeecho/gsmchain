# verl GRPO V12i training config for ChainGSM on SLURM (multi-GPU)
#
# V12i 设计: V12 prompt (内嵌在 grpo_v12_json.parquet) + V12i 4 项 reward
# Reward 公式: 3.0*r_answer + 1.5*r_step_value_lcs + 0.5*r_step_value_exact - 0.5*r_distractor
# 起点: Qwen2.5-0.5B-Instruct base (跳过 SFT)
# 数据: chaingsm_data/data/final/grpo/grpo_v12_json.parquet (3051 行, 5 类别)
# 评测: cot_brackets_v12_json method (跟 V12 一致)
#
# 训练量: 2 epoch × 762 steps/epoch = 1524 total steps (跟 V12i 本地一致)
# 保存: 每 300 步 (5 ckpts @ 300/600/900/1200/1500)
#
# 关键跟 V10 grpo_verl_vllm.yaml 的差异:
# 1. REMOTE_DATA_DIR 默认指 grpo_v12_json.parquet (而非 rl_preprocessed)
# 2. REMOTE_REWARD_PATH 默认指 reward_chaingsm_v12i_json_verl.py (V12i 4 项 reward)
# 3. 远程期望的文件名是 verl_grpo_train.parquet, 通过 submit_grpo_v12i_verl.sh
#    内部 symlink 处理 (grpo_v12_json.parquet -> verl_grpo_train.parquet)
# 4. custom_reward_function.reward_kwargs 4 项权重跟 V12i 本地一致
# 5. 训练量改 2 epoch (本地 V12i 是 2 epoch, 老 V10 config 是 1 epoch)
# 6. save_freq 改 300 (本地 V12i 是 300, 老 V10 config 是 50)
# 7. test_freq 改 -1 (训练中不评测, 避免频繁卡顿; 训练完统一跑 eval)

data:
  train_files: ${oc.env:REMOTE_DATA_DIR}/verl_grpo_train.parquet
  val_files: ${oc.env:REMOTE_DATA_DIR}/verl_grpo_train.parquet
  train_batch_size: 4
  val_batch_size: 4
  max_prompt_length: 2048
  max_response_length: 1024
  filter_overlong_prompts: true
  truncation: error

actor_rollout_ref:
  hybrid_engine: true
  model:
    path: ${oc.env:REMOTE_MODEL_PATH}
    use_remove_padding: false
    enable_gradient_checkpointing: true
  actor:
    optim:
      lr: 5.0e-7
      weight_decay: 0.1
      betas: [0.9, 0.99]
      lr_scheduler_type: cosine
      lr_warmup_steps_ratio: 0.1
      clip_grad: 0.1
    ppo_mini_batch_size: 4
    ppo_micro_batch_size_per_gpu: 1
    use_kl_loss: true
    kl_loss_coef: 0.04
    kl_loss_type: low_var_kl
    clip_ratio: 0.2
    entropy_coeff: 0
    loss_agg_mode: token-mean
    fsdp_config:
      param_offload: true
      optimizer_offload: true
    checkpoint:
      save_contents: ['model', 'optimizer', 'extra', 'hf_model']
      load_contents: ['model', 'optimizer', 'extra']
  rollout:
    name: vllm
    tensor_model_parallel_size: ${oc.env:TP_SIZE}
    gpu_memory_utilization: 0.4
    n: ${oc.env:ROLLOUT_N}
    temperature: 0.9
    top_p: 1.0
    top_k: 50
    enforce_eager: true
    free_cache_engine: true
    log_prob_micro_batch_size_per_gpu: 1
    enable_sleep_mode: true
  ref:
    log_prob_micro_batch_size_per_gpu: 1
    fsdp_config:
      param_offload: true

reward_model:
  enable: false

custom_reward_function:
  path: ${oc.env:REMOTE_REWARD_PATH}
  name: compute_reward
  reward_kwargs:
    # v12i: 4 项, 跟 V12 公式同构 (信号源重做)
    answer_weight: 3.0
    step_value_weight: 1.5
    step_value_exact_weight: 0.5
    distractor_weight: 0.5

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false

trainer:
  critic_warmup: 0
  logger: ["console", "file"]
  project_name: chaingsm_remote_grpo_verl
  experiment_name: qwen2.5-0.5b-grpo-verl-v12i-reward
  default_local_dir: ${oc.env:REMOTE_OUTPUT_DIR}/grpo_verl_v12i_vllm/checkpoints
  n_gpus_per_node: ${oc.env:SLURM_GPUS}
  nnodes: 1
  total_epochs: ${oc.env:GRPO_EPOCHS}
  save_freq: 300
  test_freq: -1
  val_before_train: false
