data:
  train_files: ${oc.env:REMOTE_DATA_DIR}/verl_grpo_train.parquet
  val_files: ${oc.env:REMOTE_DATA_DIR}/verl_grpo_train.parquet
  train_batch_size: 256
  val_batch_size: 128
  max_prompt_length: 768
  max_response_length: 2048
  filter_overlong_prompts: true
  truncation: error
actor_rollout_ref:
  model:
    path: ${oc.env:REMOTE_MODEL_PATH}
    use_remove_padding: true
    enable_gradient_checkpointing: true
    use_fused_kernels: true
  actor:
    optim:
      lr: 1.0e-6
    ppo_mini_batch_size: 64
    ppo_micro_batch_size_per_gpu: 8
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    fsdp_config:
      param_offload: false
      optimizer_offload: false
  rollout:
    name: vllm
    tensor_model_parallel_size: 2
    gpu_memory_utilization: 0.6
    n: 8
    temperature: 0.7
    top_p: 1.0
    log_prob_micro_batch_size_per_gpu: 16
  ref:
    log_prob_micro_batch_size_per_gpu: 16
    fsdp_config:
      param_offload: true
reward_model:
  enable: false
custom_reward_function:
  path: ${oc.env:REMOTE_REWARD_PATH}
  name: compute_reward
  reward_kwargs:
    format_weight: 0.2
    answer_weight: 0.4
    expression_weight: 0.2
    trace_weight: 0.2
    distractor_penalty: 0.3
    invalid_reward: -0.5
algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false
trainer:
  critic_warmup: 0
  logger: [console, wandb]
  project_name: chaingsm_remote_grpo
  experiment_name: qwen2.5-0.5b-grpo
  default_local_dir: ${oc.env:REMOTE_OUTPUT_DIR}/grpo_verl_vllm/checkpoints
  n_gpus_per_node: 4
  nnodes: 1
  save_freq: 50
  test_freq: 50
  val_before_train: false
  total_epochs: 1
ray_kwargs:
  ray_init:
    num_cpus: 32
